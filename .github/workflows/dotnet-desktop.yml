name: .NET Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore ./CyberBot_PROG_Prac1/CyberBot_PROG_Prac1.csproj

    - name: Build
      run: dotnet build ./CyberBot_PROG_Prac1/CyberBot_PROG_Prac1.csproj --no-restore
